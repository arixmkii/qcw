name: Prepare QCW Lima (from revision)
on:
  workflow_dispatch:
env:
  LIMA_GITURL: https://github.com/lima-vm/lima.git
  LIMA_SHA: 26a38210d77157dc8e2ebb5ba1df54dd481b786c
  LIMA_VERSION: dev
jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: "🏗️ Install msys2"
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make git unzip base-devel mingw-w64-ucrt-x86_64-toolchain zip mingw-w64-ucrt-x86_64-go mingw-w64-ucrt-x86_64-qemu mingw-w64-ucrt-x86_64-jq mingw-w64-ucrt-x86_64-curl openbsd-netcat socat
      - name: "🏗️ Install yq"
        shell: msys2 {0}
        run: |
            mkdir -p /usr/local/bin
            curl -o /usr/local/bin/yq.exe -L https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_windows_amd64.exe
      - name: "📝 Configure checkout"
        run: git config --global core.autocrlf input
      - name: "📝 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: "🏗️ Install lima-infra"
        shell: pwsh
        run: |
          wsl --set-default-version 2
          wsl --shutdown
          wsl --version
      - name: "📝 Fetch sources"
        shell: msys2 {0}
        run: |
          mkdir lima-release
          cd lima-release
          git init
          git remote add origin $LIMA_GITURL
          git fetch --depth 1 origin $LIMA_SHA
          git checkout FETCH_HEAD
          patch --binary -l -p 1 < ../patches/lima/0001-Enable-Integration-tests-in-Windows-CI.patch
      - name: "🛠️ Build Lima"
        working-directory: lima-release
        shell: msys2 {0}
        run: |
          make binaries
      - name: "🧪 Test Lima WSL2 (NAT)"
        working-directory: lima-release
        shell: pwsh
        run: |
          wsl --import dummy $env:TEMP nul
          wsl --list --verbose
          $env:Path = "$pwd\_output\bin;" + 'C:\Program Files\Git\usr\bin;' + $env:Path
          git.exe -v
          Set-ItemProperty -Path 'Registry::HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager\Environment' -Name PATH -Value $env:Path
          $env:MSYS2_ENV_CONV_EXCL='HOME_HOST;HOME_GUEST'
          $env:HOME_HOST=$(cygpath.exe "$env:USERPROFILE")
          $env:HOME_GUEST="/mnt$env:HOME_HOST"
          $env:LIMACTL_CREATE_ARGS='--vm-type=wsl2 --mount-type=wsl2 --containerd=system'
          bash.exe -c "./hack/test-templates.sh templates/experimental/wsl2.yaml"
